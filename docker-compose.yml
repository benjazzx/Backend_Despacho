services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  back-ventas:
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ventas_db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend_network

  back-despachos:
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: despachos_db
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend_network

  frontend:
    build:
      context: ./front_despacho
      args:
        VITE_VENTAS_URL: ${VITE_VENTAS_URL:-http://localhost:8080}
        VITE_DESPACHOS_URL: ${VITE_DESPACHOS_URL:-http://localhost:8081}
    ports:
      - "80:8080"
    networks:
      - frontend_network

volumes:
  mysql_data:
    name: innovatech_mysql_data

networks:
  backend_network:
    driver: bridge
  frontend_network:
    driver: bridge
